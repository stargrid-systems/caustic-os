name: Test build

on:
  workflow_dispatch:
    inputs:
      target:
        description: Nix installable to build
        required: true
        default: .#nixosConfigurations.devImage.config.system.build.updatePackage
        type: choice
        options:
          - .#packages.aarch64-linux.caustic-ota
          - .#packages.aarch64-linux.aperture
          - .#nixosConfigurations.devImage.config.boot.kernelPackages.kernel
          - .#nixosConfigurations.devImage.config.system.build.toplevel
          - .#nixosConfigurations.devImage.config.system.build.updatePackage

permissions:
  contents: read

env:
  NIX_CACHE_BUCKET: ${{ vars.NIX_CACHE_BUCKET }}
  NIX_CACHE_ENDPOINT: ${{ vars.NIX_CACHE_ENDPOINT }}
  NIX_CACHE_REGION: ${{ vars.NIX_CACHE_REGION }}
  NIX_CACHE_PUBLIC_KEY: ${{ vars.NIX_CACHE_PUBLIC_KEY }}

jobs:
  build:
    name: Build ${{ inputs.target }}
    runs-on: ubuntu-26.04-arm
    environment: dev
    env:
      NIX_CACHE_PRIVATE_KEY: ${{ secrets.NIX_CACHE_PRIVATE_KEY }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Enable unprivileged user namespaces
        run: |
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 || true
          cat /proc/sys/kernel/apparmor_restrict_unprivileged_userns || true
          cat /proc/sys/user/max_user_namespaces || true

      - name: Setup Nix with S3 cache
        uses: ./.github/actions/setup-nix-cache

      - name: Build
        run: |
          nix build \
            --keep-going \
            ${{ inputs.target }} \
            --out-link result \
            --print-build-logs

      - name: Upload to S3 cache
        if: always()
        continue-on-error: true
        env:
          NIX_CACHE_URL: s3://${{ vars.NIX_CACHE_BUCKET }}?endpoint=${{ vars.NIX_CACHE_ENDPOINT }}&scheme=https&region=${{ vars.NIX_CACHE_REGION }}
        run: |
          # Upload everything in the local store (build outputs + build-time deps).
          # The runner is ephemeral so the store only contains what this build needed.
          nix copy --to "$NIX_CACHE_URL" --all
