name: Test build

on:
  workflow_dispatch:
    inputs:
      target:
        description: Nix installable to build
        required: true
        default: .#nixosConfigurations.devImage.config.system.build.updatePackage
        type: choice
        options:
          - .#packages.aarch64-linux.caustic-ota
          - .#packages.aarch64-linux.aperture
          - .#nixosConfigurations.devImage.config.boot.kernelPackages.kernel
          - .#nixosConfigurations.devImage.config.system.build.toplevel
          - .#nixosConfigurations.devImage.config.system.build.updatePackage

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ inputs.target }}
    runs-on: ubuntu-26.04-arm
    environment: dev
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Enable unprivileged user namespaces
        run: |
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 || true

      - name: Install Determinate Nix
        uses: DeterminateSystems/determinate-nix-action@2a0be2498974c2b6327e19780488744384637d88  # v3.21.7

      - name: Setup Nix S3 cache
        uses: lemmih/nix-s3-cache-action@b0ad3ac7509d39827fa685f2ba598114e792c07b
        with:
          s3-endpoint: ${{ vars.NIX_CACHE_ENDPOINT }}
          bucket: ${{ vars.NIX_CACHE_BUCKET }}
          region: ${{ vars.NIX_CACHE_REGION }}
          public-key: ${{ vars.NIX_CACHE_PUBLIC_KEY }}
          private-key: ${{ secrets.NIX_CACHE_PRIVATE_KEY }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Ensure daemon can read S3 credentials
        run: |
          sudo systemctl stop nix-daemon
          sudo mkdir -p /etc/systemd/system/nix-daemon.service.d
          sudo tee /etc/systemd/system/nix-daemon.service.d/override.conf > /dev/null <<'EOF'
          [Service]
          Environment=HOME=/root
          Environment=AWS_SHARED_CREDENTIALS_FILE=/root/.aws/credentials
          Environment=AWS_CONFIG_FILE=/root/.aws/config
          EOF
          sudo systemctl daemon-reload
          sudo systemctl start nix-daemon

      - name: Build
        run: |
          nix build \
            --keep-going \
            ${{ inputs.target }} \
            --out-link result \
            --print-build-logs
