name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 0 * * 0"

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-26.04
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@f1fabe8df38549d2cddf98d6f49690ed718e9028  # v3.x
        with:
          languages: rust
          queries: +security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@f1fabe8df38549d2cddf98d6f49690ed718e9028  # v3.x

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@f1fabe8df38549d2cddf98d6f49690ed718e9028  # v3.x
