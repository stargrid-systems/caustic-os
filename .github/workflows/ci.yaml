name: CI

on:
  pull_request:
  merge_group:
  workflow_dispatch:

permissions:
  contents: read

env:
  NIX_CACHE_BUCKET: ${{ vars.NIX_CACHE_BUCKET }}
  NIX_CACHE_ENDPOINT: ${{ vars.NIX_CACHE_ENDPOINT }}
  NIX_CACHE_REGION: ${{ vars.NIX_CACHE_REGION }}
  NIX_CACHE_PUBLIC_KEY: ${{ vars.NIX_CACHE_PUBLIC_KEY }}

jobs:
  quick-checks:
    name: Quick checks
    runs-on: ubuntu-26.04
    if: github.event_name != 'push'
    env:
      NIX_CACHE_PRIVATE_KEY: ${{ secrets.NIX_CACHE_PRIVATE_KEY }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Nix with S3 cache
        uses: ./.github/actions/setup-nix-cache

      - name: nix flake check
        run: nix flake check --print-build-logs

  build-images:
    name: Build images (merge queue)
    runs-on: ubuntu-26.04-arm
    if: github.event_name == 'merge_group' || github.event_name == 'workflow_dispatch'
    env:
      NIX_CACHE_PRIVATE_KEY: ${{ secrets.NIX_CACHE_PRIVATE_KEY }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Nix with S3 cache
        uses: ./.github/actions/setup-nix-cache

      # Validates that the flake evaluates cleanly for the target architecture.
      # Real image outputs land in later phases:
      #   nix build .#packages.aarch64-linux.productionImage
      #   nix build .#packages.aarch64-linux.devImage
      - name: Evaluate flake for aarch64-linux
        run: nix flake show --system aarch64-linux --print-build-logs
