name: CI

on:
  pull_request:
  merge_group:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  actions: write

jobs:
  quick-checks:
    name: Quick checks
    runs-on: ubuntu-26.04
    if: github.event_name != 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Install Determinate Nix
        uses: DeterminateSystems/determinate-nix-action@2a0be2498974c2b6327e19780488744384637d88  # v3.21.7

      - name: FlakeHub Cache
        uses: DeterminateSystems/flakehub-cache-action@3be0931021788e3bb4df65f59a555039c2fa2d46  # v3.21.7

      - name: nix flake check
        run: nix flake check --print-build-logs

  build-images:
    name: Build images (merge queue)
    runs-on: ubuntu-26.04-arm
    if: github.event_name == 'merge_group' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Install Determinate Nix
        uses: DeterminateSystems/determinate-nix-action@2a0be2498974c2b6327e19780488744384637d88  # v3.21.7

      - name: FlakeHub Cache
        uses: DeterminateSystems/flakehub-cache-action@3be0931021788e3bb4df65f59a555039c2fa2d46  # v3.21.7

      # Validates that the flake evaluates cleanly for the target architecture.
      # Real image outputs land in later phases:
      #   nix build .#packages.aarch64-linux.productionImage
      #   nix build .#packages.aarch64-linux.devImage
      - name: Evaluate flake for aarch64-linux
        run: nix flake show --system aarch64-linux --print-build-logs
